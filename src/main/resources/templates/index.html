<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>회의록 관리 시스템</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        /* 기본 레이아웃 및 폰트 */
        body {
            background-color: #f9f9f9;
            font-family: 'Malgun Gothic', sans-serif;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 20px auto;
            background: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
            border-top: 4px solid #48c9b0;
        }

        /* 타이틀 영역 */
        .page-title {
            font-size: 18px;
            font-weight: bold;
            color: #555;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        /* 상단 검색 필터 영역 (두 번째 이미지 스타일) */
        .search-container {
            background: #fdfdfd;
            border: 1px solid #e0e0e0;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 2px;
        }

        .search-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;
        }

        .search-item {
            display: flex;
            align-items: center;
            flex: 1;
        }

        .search-item label {
            width: 80px;
            font-size: 13px;
            color: #666;
            font-weight: bold;
        }

        .search-item input,
        .search-item select {
            flex: 1;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 2px;
            font-size: 13px;
        }

        .search-actions {
            text-align: right;
            border-top: 1px dashed #eee;
            padding-top: 10px;
        }

        .btn-search {
            background-color: #f39c12;
            color: white;
            border: none;
            padding: 6px 20px;
            cursor: pointer;
            border-radius: 3px;
            font-weight: bold;
        }

        /* 테이블 컨트롤 (등록 버튼 등) */
        .table-control {
            display: flex;
            justify-content: flex-end;
            gap: 5px;
            margin-bottom: 10px;
        }

        .btn-add {
            background-color: #48c9b0;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 3px;
            font-size: 13px;
            text-decoration: none;
        }

        .btn-excel {
            background-color: #fff;
            color: #666;
            border: 1px solid #ccc;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 12px;
        }

        /* 테이블 디자인 (그린 포인트) */
        .meeting-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            border-top: 2px solid #48c9b0;
        }

        .meeting-table th {
            background-color: #48c9b0;
            color: white;
            padding: 12px 8px;
            font-weight: normal;
            border: 1px solid #42b9a0;
        }

        .meeting-table td {
            padding: 10px 8px;
            border: 1px solid #eee;
            text-align: center;
            color: #555;
        }

        .meeting-table tr:nth-child(even) {
            background-color: #fafafa;
        }

        .meeting-table tr:hover {
            background-color: #f1f8f7;
        }

        .meeting-table td.title-cell {
            text-align: left;
            padding-left: 15px;
        }

        .meeting-table td.title-cell a {
            text-decoration: none;
            color: #2c3e50;
            font-weight: 600;
        }

        /* 페이지네이션 */
        .pagination {
            margin-top: 20px;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .pagination a {
            padding: 5px 10px;
            border: 1px solid #ddd;
            color: #666;
            text-decoration: none;
            font-size: 12px;
            border-radius: 2px;
        }

        .pagination a.active {
            background-color: #48c9b0;
            color: white;
            border-color: #48c9b0;
            font-weight: bold;
        }

        .no-data {
            padding: 50px;
            color: #999;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="page-title" style="cursor: pointer;">
            <a th:href="@{/meeting/}" style="text-decoration: none; color: #333; font-weight: bold;">
                회의록 관리
            </a>
        </div>

        <div class="search-container">
            <form action="/meeting/" method="get">
                <div class="search-row">
                    <div class="search-item">
                        <label>검색조건</label>
                        <select name="type">
                            <option value="T" th:selected="${pageMaker.cri.type == 'T'}">제목</option>
                            <option value="C" th:selected="${pageMaker.cri.type == 'C'}">내용</option>
                            <option value="TC" th:selected="${pageMaker.cri.type == 'TC'}">제목+내용</option>
                        </select>
                    </div>
                    <div class="search-item">
                        <label>검색어</label>
                        <input type="text" name="keyword" th:value="${pageMaker.cri.keyword}"
                            placeholder="검색어를 입력해 주세요.">
                    </div>
                </div>
                <div class="search-actions">
                    <button type="submit" class="btn-search">조회</button>
                </div>
            </form>
        </div>

        <div class="table-control">
            <a th:href="@{/meeting/register}" class="btn-add">등록</a>
        </div>

        <table class="meeting-table">
            <thead>
                <tr>
                    <th style="width: 50px;">번호</th>
                    <th>회의 제목</th>
                    <th style="width: 150px;">작성자(사번)</th>
                    <th style="width: 150px;">회의 일시</th>
                    <th style="width: 120px;">등록일</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="meeting, iterStat : ${meetings}">
                    <td th:text="${(pageMaker.cri.page - 1) * pageMaker.cri.amount + iterStat.count}">1</td>
                    <td class="title-cell">
                        <a th:href="@{/meeting/detail-json/{id}(id=${meeting.meetingId})}" th:text="${meeting.title}">회의
                            제목 예시</a>
                    </td>
                    <td th:text="${meeting.empinm + '(' + meeting.empino + ')'}">홍길동(2024001)</td>
                    <td th:text="${#temporals.format(meeting.meetingDate, 'yyyy-MM-dd HH:mm')}">2026-04-23 15:30</td>
                    <td th:text="${#temporals.format(meeting.createdAt, 'yyyy-MM-dd')}">2026-04-15</td>
                </tr>
                <tr th:if="${#lists.isEmpty(meetings)}">
                    <td colspan="5" class="no-data">등록된 회의록이 없습니다.</td>
                </tr>
            </tbody>
        </table>

        <div class="pagination">
            <a th:if="${pageMaker.prev}"
                th:href="@{/meeting/(page=${pageMaker.startPage - 1}, type=${pageMaker.cri.type}, keyword=${pageMaker.cri.keyword})}">이전</a>

            <th:block th:each="num : ${#numbers.sequence(pageMaker.startPage, pageMaker.endPage)}">
                <a th:href="@{/meeting/(page=${num}, type=${pageMaker.cri.type}, keyword=${pageMaker.cri.keyword})}"
                    th:text="${num}" th:class="${pageMaker.cri.page == num} ? 'active' : ''"></a>
            </th:block>

            <a th:if="${pageMaker.next}"
                th:href="@{/meeting/(page=${pageMaker.endPage + 1}, type=${pageMaker.cri.type}, keyword=${pageMaker.cri.keyword})}">다음</a>
        </div>
    </div>

</body>

</html>
