<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>회의록 등록</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <link rel="stylesheet" th:href="@{/css/meeting-register.css}">
</head>

<body>
    <div class="container">
        <h2>회의록 등록</h2>
        <form id="registerForm" th:action="@{/meeting/register}" th:object="${meeting}"
              method="post" enctype="multipart/form-data">

            <div class="form-group">
                <label>회의 제목 <span class="required-star">*</span></label>
                <input type="text" th:field="*{title}" placeholder="2자 이상 입력하세요">
                <div id="titleMsg" class="validation-msg">필수 항목입니다.</div>
            </div>

            <div class="form-group">
                <label>회의 일시 <span class="required-star">*</span></label>
                <div id="dateMsg" class="validation-msg"></div>
                <div class="datetime-wrapper">
                    <input type="date" id="meetingDay" required>
                    <select id="meetingHour" required></select>
                    <span>:</span>
                    <select id="meetingMin" required>
                        <option value="00">00</option>
                        <option value="30">30</option>
                    </select>
                </div>

                <input type="hidden" th:field="*{meetingDate}" id="meetingDate">
            </div>

            <div class="form-group">
                <label>회의 장소</label>
                <input type="text" th:field="*{location}">
            </div>

            <div class="form-group">
                <label>작성자 사번 <span class="required-star">*</span></label>
                <input type="text" th:field="*{empino}" placeholder="숫자 10자리를 입력하세요">
                <div id="empinoMsg" class="validation-msg">필수 항목입니다.</div>
            </div>

            <div class="form-group">
                <label>작성자 이름</label>
                <input type="text" th:field="*{empinm}">
            </div>

            <div class="form-group">
                <label>회의 참석자</label>
                <div style="margin-bottom: 10px;">
                    <button type="button" id="btnOpenModal" class="btn-secondary">사원 검색/추가</button>
                </div>

                <div id="attendeeList" class="attendee-list" style="border: 1px solid #ddd; padding: 10px; min-height: 40px; background: #fff;">
                    <span class="empty-msg">선택된 참석자가 없습니다.</span>
                </div>

                <!-- <input type="hidden" name="attendeeIds" id="attendeeIds"> -->
            </div>

            <div class="form-group">
                <label>회의 내용</label>
                <textarea th:field="*{content}"></textarea>
            </div>

            <div class="form-group">
                <label>첨부파일 (PDF만 가능, 최대 10MB)</label>
                <input type="file" id="meetingFile" name="file" accept=".pdf">
            </div>

            <button type="submit" class="btn-submit">등록하기</button>
        </form>
    </div>

    <div id="employeeModal" class="modal" style="display:none; position:fixed; z-index:100; left:0; top:0; width:100%; height:100%; background-color: rgba(0,0,0,0.5);">
        <div class="modal-content" style="background-color:#fff; margin:10% auto; padding:20px; border-radius:8px; width:500px; max-height:80vh; overflow-y:auto;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3>참석자 추가</h3>
                <span id="btnCloseModal" style="cursor:pointer; font-size:24px;">&times;</span>
            </div>

            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="modalSearchInput" placeholder="이름을 입력하세요" style="flex:1; padding:8px;">
                <button type="button" id="btnModalSearch" style="padding:8px 15px; background:#4A90E2; color:white; border:none; border-radius:4px;">검색</button>
            </div>

            <div id="modalSearchResult" style="border:1px solid #ddd; min-height:150px; padding:10px; margin-bottom:15px;">
                <p style="color:#999; text-align:center;">이름을 검색해 주세요.</p>
            </div>

            <button type="button" id="btnAddSelected" style="width:100%; padding:10px; background:#27ae60; color:white; border:none; border-radius:4px;">선택 완료</button>
        </div>
    </div>

</body>
<!-- <script th:src="@{/js/meeting-register.js}"></script> -->

<script th:src="@{/js/meeting-utils.js}"></script>
<script th:src="@{/js/meeting.js}"></script>
<script th:src="@{/js/attendee-modal.js}"></script>


<script th:inline="javascript">
    /*<![CDATA[*/
    window.onload = function() {
        // 서버에서 보낸 errorMessage가 있는지 확인
        var message = [[${errorMessage}]];
        if (message) {
            alert(message);
        }
    };
    /*]]>*/
</script>

</html>
