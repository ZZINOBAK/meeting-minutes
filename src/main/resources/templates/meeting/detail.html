<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>회의록 상세 및 수정</title>
  <style>
    .container { width: 800px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; font-family: sans-serif; }
    .info-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    .info-table th { background: #f4f4f4; width: 150px; padding: 10px; border: 1px solid #ddd; text-align: left; }
    .info-table td { padding: 10px; border: 1px solid #ddd; }
    .content-box { min-height: 300px; padding: 15px; background: #f9f9f9; border: 1px solid #ddd; line-height: 1.6; margin-bottom: 20px; }
    .file-box { padding: 10px; border: 1px solid #e9e9e9; background: #fff; margin-bottom: 20px; }
    .btn-group { text-align: right; }
    .btn { padding: 8px 15px; text-decoration: none; border-radius: 4px; color: white; background: #333; font-size: 14px; cursor: pointer; border: none; display: inline-block; }
    .edit-mode { display: none; } /* 초기에는 수정 모드 숨김 */
    input[type="text"], textarea, input[type="datetime-local"] { width: 100%; padding: 5px; box-sizing: border-box; }
  </style>
</head>
<body>

<div class="container">
  <h2>📋 회의록 상세 정보</h2>

  <form id="updateForm" th:action="@{/meeting/update}" method="post" enctype="multipart/form-data" onsubmit="return confirmUpdate();">
    <input type="hidden" name="meetingId" th:value="${meeting.meetingId}">

    <table class="info-table">
      <tr>
        <th>제목</th>
        <td colspan="3">
          <span class="view-mode" th:text="${meeting.title}" style="font-weight: bold;"></span>
          <input type="text" name="title" class="edit-mode" th:value="${meeting.title}">
        </td>
      </tr>
      <tr>
        <th>작성자</th>
        <td>
          <span class="view-mode" th:text="|${meeting.empinm} (${meeting.empino})|"></span>

          <div class="edit-mode" style="display:none;">
            <input type="text" name="empinm" th:value="${meeting.empinm}" style="width: 45%;" placeholder="이름">
            <input type="text" name="empino" th:value="${meeting.empino}" style="width: 45%;" placeholder="사번">
          </div>
        </td>
        <th>회의 일시</th>
        <td>
          <span class="view-mode" th:text="${#temporals.format(meeting.meetingDate, 'yyyy-MM-dd HH:mm')}"></span>
          <input type="datetime-local" name="meetingDate" class="edit-mode" th:value="${meeting.meetingDate}">
        </td>
      </tr>
      <tr>
        <th>장소</th>
        <td colspan="3">
          <span class="view-mode" th:text="${meeting.location}"></span>
          <input type="text" name="location" class="edit-mode" th:value="${meeting.location}">
        </td>
      </tr>
    </table>

    <div class="content-box">
      <div class="view-mode" th:utext="${#strings.replace(meeting.content, '\n', '&lt;br /&gt;')}"></div>
      <textarea name="content" class="edit-mode" th:text="${meeting.content}" style="min-height: 300px;"></textarea>
    </div>

    <div class="file-box">
      <strong>📎 첨부파일:</strong>
      <span class="view-mode">
    <span th:if="${meeting.attachment == null}">첨부파일 없음</span>
    <span th:if="${meeting.attachment != null}">
      <span th:text="${meeting.attachment.originalName}">파일명.pdf</span>

      <a th:href="@{/file/download/{id}(id=${meeting.attachment.attachmentId})}"
         class="btn"
         style="background: #28a745; font-size: 11px;"
         onclick="return confirm('파일을 다운로드 하시겠습니까?');">다운로드</a>
    </span>
</span>
      <div class="edit-mode">
        <div th:if="${meeting.attachment != null}" id="oldFileArea">
          <span th:text="|기존 파일: ${meeting.attachment.originalName}|"></span>

          <input type="checkbox" name="deleteFile" id="deleteFileCheck" value="Y" style="display:none;">

          <button type="button" class="btn"
                  style="background: #dc3545; font-size: 11px; margin-left: 10px;"
                  onclick="confirmDeleteFile()">삭제</button>
        </div>

        <div id="newFileArea" style="margin-top: 5px;">
<!--          <input type="file" name="newFile">-->
<!--          <p style="font-size: 11px; color: #666;">* 파일을 교체하려면 새 파일을 선택하세요.</p>-->
          <input type="file" name="newFile" accept="application/pdf">
          <p style="font-size: 11px; color: #666;">* PDF 파일만 업로드 가능합니다.</p>
        </div>
      </div>
    </div>

    <div class="btn-group">
      <a th:href="@{/meeting/}" class="btn view-mode">목록으로</a>
      <button type="button" class="btn view-mode" onclick="toggleEdit(true)" style="background: #007bff;">수정</button>
      <button type="button" class="btn view-mode" onclick="confirmDelete()" style="background: #222222;">삭제</button>
      <button type="submit" class="btn edit-mode" style="background: #28a745;">저장</button>
      <button type="button" class="btn edit-mode" onclick="toggleEdit(fal se)" style="background: #6c757d;">취소</button>
    </div>
  </form>
</div>

<script>
  function toggleEdit(isEdit) {
    const viewElements = document.querySelectorAll('.view-mode');
    const editElements = document.querySelectorAll('.edit-mode');
    viewElements.forEach(el => el.style.display = isEdit ? 'none' : 'inline-block');
    editElements.forEach(el => el.style.display = isEdit ? 'inline-block' : 'none');
    if(isEdit) {
        document.querySelector('textarea.edit-mode').style.display = 'block';
        if(document.querySelector('div.edit-mode')) document.querySelector('div.edit-mode').style.display = 'block';
    }
  }

  function confirmDeleteFile() {
    // 1. 사용자에게 단순하게 묻기
    if (confirm("이 파일을 삭제하시겠습니까?")) {

        // 2. 서버로 보낼 체크박스 체크 (보이지 않지만 체크됨)
        const checkBtn = document.getElementById('deleteFileCheck');
        if(checkBtn) checkBtn.checked = true;

        // 3. 화면에서 기존 파일 정보 덩어리를 통째로 숨기기
        const displayArea = document.getElementById('oldFileArea');
        if(displayArea) displayArea.style.display = 'none';

        // 4. (선택) 삭제했다는 피드백만 살짝
        console.log("파일 삭제 선택됨. 저장 시 최종 반영.");
    }
}

  function confirmUpdate() {
    // 사용자에게 마지막으로 확인
    return confirm("수정된 내용을 저장하시겠습니까?");
}

  function confirmDelete() {
    if (confirm("정말로 이 회의록을 삭제하시겠습니까?")) {
      // 삭제 처리를 위한 URL로 이동 (ID 전달)
      const meetingId = [[${meeting.meetingId}]];
      location.href = "/meeting/delete/" + meetingId;
    }
  }
</script>
</body>
</html>
