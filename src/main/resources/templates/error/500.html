<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>시스템 오류 - 500</title>
    <style>
        body { font-family: 'sans-serif'; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .error-container { text-align: center; background: white; padding: 50px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 500px; }
        h1 { font-size: 72px; color: #dc3545; margin: 0; }
        h2 { color: #333; margin-bottom: 20px; }
        p { color: #666; line-height: 1.6; margin-bottom: 30px; }
        .btn { padding: 10px 20px; text-decoration: none; border-radius: 4px; color: white; background: #333; transition: background 0.3s; }
        .btn:hover { background: #555; }
        .debug-info { margin-top: 30px; text-align: left; font-size: 12px; color: #999; border-top: 1px solid #eee; padding-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="error-container">
    <h1>500</h1>
    <h2>서버에 문제가 발생했습니다.</h2>
    <p>
        요청을 처리하는 중에 예상치 못한 오류가 발생했습니다.<br>
        잠시 후 다시 시도해주시거나 관리자에게 문의해주세요.
    </p>

    <div class="btn-group">
        <a href="/" class="btn">홈으로 돌아가기</a>
        <a href="javascript:history.back();" class="btn" style="background: #6c757d; margin-left: 10px;">이전 페이지</a>
    </div>

    <div class="debug-info" th:if="${message}">
        <strong>Error Message:</strong> <span th:text="${message}"></span>
    </div>
</div>

</body>
</html>
